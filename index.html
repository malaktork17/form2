<!DOCTYPE html>
<html lang="ar">

<head>
  <meta charset="UTF-8">
  <title>Styled Form</title>
  <style>
    /* جسم الصفحة */
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* صندوق الفورم */
    .form-container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      width: 350px;
    }

    /* عنوان الفورم */
    .form-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    /* كل حقل */
    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    /* عنوان الحقل */
    .form-group label {
      margin-bottom: 5px;
      font-weight: bold;
      color: #555;
    }

    /* حقول الإدخال */
    .form-group input,
    .form-group textarea,
    .form-group select {
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: all 0.3s;
      font-size: 14px;
    }

    /* تأثير التركيز */
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 5px rgba(74, 144, 226, 0.5);
    }

    /* زر الإرسال */
    .form-container button {
      width: 100%;
      padding: 12px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .form-container button:hover {
      background: #357ABD;
    }

    /* نص مساعدة أو ملاحظات */
    .form-help {
      font-size: 12px;
      color: #999;
      margin-top: -15px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

  <div class="form-container">
    <h2>تسجيل دخول</h2>
    <form action="mailto:malak2rk18@gmail.com" method="post" enctype="text/plain">
      <div class="form-group">
        <label for="name">الاسم</label>
        <input type="text" id="name" placeholder="أدخل اسمك">
      </div>

      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="أدخل بريدك">
      </div>

      <div class="form-group">
        <label for="message">الرسالة</label>
        <textarea id="message" rows="4" placeholder="اكتب رسالتك"></textarea>
      </div>

      <button type="submit">إرسال</button>
    </form>
  </div>

</body>

</html>
